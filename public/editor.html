<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiRally — Track Editor</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a18;
      color: #ccc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== CANVAS AREA ===== */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #editor-3d-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #editor-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
      z-index: 2;
      background: transparent;
    }
    #canvas-hint {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      pointer-events: none;
      z-index: 3;
    }
    #canvas-hint span {
      font-size: 10px;
      color: #556;
      padding: 3px 8px;
      background: rgba(10, 10, 24, 0.7);
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 320px;
      background: rgba(10, 10, 20, 0.98);
      border-left: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Header --- */
    #sidebar-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #sidebar-header h2 {
      font-size: 20px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
    }
    #back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      color: #aaa;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
    }
    #back-link:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      transform: scale(1.05);
      text-decoration: none;
    }

    /* --- Scrollable content --- */
    #sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #sidebar-content::-webkit-scrollbar { width: 6px; }
    #sidebar-content::-webkit-scrollbar-track { background: transparent; }
    #sidebar-content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
    }
    #sidebar-content::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.15);
    }

    /* --- Panel cards (sections) --- */
    .section {
      background: rgba(20, 20, 30, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #667;
      font-weight: 600;
      margin-bottom: 12px;
    }

    /* --- Labels --- */
    label {
      display: block;
      font-size: 11px;
      color: #aab;
      margin-bottom: 5px;
    }

    /* --- Inputs --- */
    input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: #3498db;
      background: rgba(52, 152, 219, 0.08);
    }
    select option, select optgroup {
      background: #14141e;
      color: #fff;
    }

    /* --- Sliders --- */
    input[type="range"] {
      width: 100%;
      accent-color: #3498db;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .slider-val {
      min-width: 30px;
      text-align: right;
      font-size: 12px;
      color: #f39c12;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    /* --- Buttons base --- */
    button {
      padding: 7px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: #aab;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      transform: scale(1.02);
    }
    button:active {
      transform: scale(0.98);
    }

    /* Button variants */
    .btn-primary {
      background: rgba(52,152,219,0.15);
      border-color: rgba(52,152,219,0.3);
      color: #3498db;
    }
    .btn-primary:hover {
      background: rgba(52,152,219,0.25);
      color: #5dade2;
    }
    .btn-save {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 20px;
      box-shadow: 0 4px 15px rgba(46,204,113,0.25);
    }
    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(46,204,113,0.35);
      color: #fff;
    }
    .btn-save:active {
      transform: translateY(0);
    }
    .btn-danger {
      background: #e74c3c;
      border: none;
      color: #fff;
      font-weight: bold;
    }
    .btn-danger:hover {
      background: #c0392b;
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #999;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }

    /* --- Tool bar --- */
    .tool-bar {
      display: flex;
      gap: 6px;
    }
    .tool-btn {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: #aaa;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .tool-btn:hover {
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
    }
    .tool-btn.active {
      border-color: #3498db;
      background: rgba(52,152,219,0.12);
      color: #fff;
      box-shadow: 0 0 12px rgba(52,152,219,0.15);
    }
    .tool-btn kbd {
      display: inline-block;
      padding: 2px 6px;
      margin-left: 4px;
      font-size: 9px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 3px;
      color: #667;
      font-family: 'Courier New', monospace;
      vertical-align: 1px;
    }
    .tool-btn.active kbd {
      background: rgba(52,152,219,0.2);
      border-color: rgba(52,152,219,0.3);
      color: #5dade2;
    }

    /* --- Checkbox row --- */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .checkbox-row input[type="checkbox"] {
      accent-color: #3498db;
      width: 14px;
      height: 14px;
    }
    .checkbox-row label {
      margin: 0;
      cursor: pointer;
      font-size: 12px;
      color: #aab;
    }

    /* --- Point rows --- */
    .point-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      margin-bottom: 3px;
      font-size: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .point-row:hover {
      background: rgba(255,255,255,0.06);
    }
    .point-row .pt-idx {
      min-width: 22px;
      color: #556;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
    }
    .point-row input[type="number"] {
      width: 62px;
      padding: 4px 6px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
    }
    .point-row .pt-del {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
      font-weight: normal;
    }
    .point-row:hover .pt-del {
      opacity: 1;
    }
    .point-row .pt-del:hover {
      color: #ff6b6b;
      transform: scale(1.1);
    }
    #points-list { max-height: 250px; overflow-y: auto; }

    /* --- Slick rows --- */
    .slick-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      margin-bottom: 3px;
      font-size: 11px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      transition: all 0.15s;
    }
    .slick-row:hover {
      background: rgba(255,255,255,0.06);
    }
    .slick-row input[type="number"] {
      width: 55px;
      padding: 4px 6px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
    }
    .slick-row .pt-del {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
      font-weight: normal;
    }
    .slick-row:hover .pt-del {
      opacity: 1;
    }
    .slick-row .pt-del:hover {
      color: #ff6b6b;
      transform: scale(1.1);
    }
    #slicks-list { max-height: 120px; overflow-y: auto; }

    /* --- Footer --- */
    #sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .footer-main-actions {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .footer-main-actions .btn-save { flex: 1; }
    .footer-main-actions .btn-primary { padding: 10px 14px; }
    .footer-main-actions .btn-danger { padding: 10px 14px; }
    .footer-row {
      display: flex;
      gap: 6px;
    }
    .footer-row button {
      flex: 1;
    }
    #status-msg {
      font-size: 11px;
      color: #2ecc71;
      min-height: 16px;
      text-align: center;
    }

    /* --- Spacing helpers --- */
    .spacer-sm { height: 6px; }
    .input-group { margin-bottom: 8px; }

    /* --- Links (hidden, using button instead) --- */
    a { color: #3498db; text-decoration: none; font-size: 13px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="editor-3d-canvas"></canvas>
    <canvas id="editor-canvas"></canvas>
    <div id="canvas-hint">
      <span>Drag: Move</span>
      <span>Shift+Click: Multi-select</span>
      <span>Box Select: Drag empty</span>
      <span>Ctrl+Click: Add point</span>
      <span>Right-Click: Delete</span>
      <span>A S D: Tools</span>
      <span>Scroll: Zoom</span>
      <span>Middle: Pan</span>
    </div>
  </div>
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Track Editor</h2>
      <a href="/" id="back-link" title="Back to Lobby">&#x2190;</a>
    </div>
    <div id="sidebar-content">
      <div class="section">
        <div class="section-title">Tools</div>
        <div class="tool-bar">
          <button class="tool-btn active" data-mode="select">Select<kbd>A</kbd></button>
          <button class="tool-btn" data-mode="scale">Scale<kbd>S</kbd></button>
          <button class="tool-btn" data-mode="rotate">Rotate<kbd>D</kbd></button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Track Info</div>
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="track-name-input" value="New Track" />
        </div>
        <div class="input-group">
          <label>Key (unique ID)</label>
          <input type="text" id="track-key-input" value="newTrack" />
        </div>
      </div>

      <div class="section">
        <div class="section-title">Properties</div>
        <label>Road Width</label>
        <div class="slider-row">
          <input type="range" id="width-slider" min="30" max="70" value="50" />
          <span class="slider-val" id="width-val">50</span>
        </div>
        <div class="spacer-sm"></div>
        <label>Smoothness (points/segment)</label>
        <div class="slider-row">
          <input type="range" id="smooth-slider" min="8" max="30" value="16" />
          <span class="slider-val" id="smooth-val">16</span>
        </div>
        <div class="spacer-sm"></div>
        <button id="reverse-btn" class="btn-secondary" style="width:100%">&#x21C4; Reverse Direction</button>
        <div class="checkbox-row">
          <input type="checkbox" id="show-checkpoints" />
          <label for="show-checkpoints">Show Checkpoints</label>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Control Points</div>
        <div id="points-list"></div>
        <button id="add-point-btn" class="btn-primary" style="margin-top:8px;width:100%">+ Add Point</button>
      </div>

      <div class="section">
        <div class="section-title">Oil Slicks</div>
        <div id="slicks-list"></div>
        <button id="add-slick-btn" class="btn-secondary" style="margin-top:8px;width:100%">+ Add Oil Slick</button>
      </div>

      <div class="section">
        <div class="section-title">Load Track</div>
        <select id="load-track-select">
          <option value="">— Select —</option>
        </select>
      </div>
    </div>
    <div id="sidebar-footer">
      <div class="footer-main-actions">
        <button id="save-btn" class="btn-save">Save to Server</button>
        <button id="copy-btn" class="btn-primary">Copy JS</button>
        <button id="delete-btn" class="btn-danger">Delete</button>
      </div>
      <div class="footer-row">
        <button id="export-track-btn" class="btn-secondary">Export Track</button>
        <button id="import-track-btn" class="btn-secondary">Import Track</button>
      </div>
      <div class="footer-row">
        <button id="export-all-btn" class="btn-secondary">Export All</button>
        <button id="import-btn" class="btn-secondary">Import All</button>
      </div>
      <div id="status-msg"></div>
    </div>
  </div>
  <script type="module" src="/js/editor.js"></script>
</body>
</html>
