<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiRally</title>
  <meta name="description" content="Online multiplayer top-down racing game inspired by GeneRally. Built with Three.js and WebSockets.">
  <meta property="og:title" content="MultiRally">
  <meta property="og:description" content="Online multiplayer top-down racing game inspired by GeneRally. Built with Three.js and WebSockets.">
  <meta property="og:image" content="/preview.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MultiRally">
  <meta name="twitter:description" content="Online multiplayer top-down racing game inspired by GeneRally.">
  <meta name="twitter:image" content="/preview.jpg">
  <link rel="stylesheet" href="/css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- Lobby overlay -->
    <div id="lobby" class="overlay">
      <div id="lobby-content">
        <!-- Header -->
        <div id="lobby-header">
          <div id="lobby-title">
            <h1>MultiRally</h1>
            <span class="subtitle">Online top-down racing</span>
          </div>
          <div id="lobby-header-controls">
            <a href="/editor.html" id="editor-btn" title="Track Editor" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#ccc;font-size:16px;text-decoration:none;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">&#x270E;</a>
            <button id="keybinds-toggle-btn" title="Key bindings">&#x2328;</button>
            <button id="settings-toggle-btn" title="Physics settings">&#x1f527;</button>
            <button id="chat-toggle-btn" title="Toggle chat">&#x1f4ac;</button>
            <button id="sound-toggle" title="Toggle sound (0)">&#x1f50a;</button>
          </div>
        </div>

        <!-- Left column -->
        <div id="lobby-left">
          <div id="player-identity" class="lobby-panel">
            <h3>Your Profile</h3>
            <div id="identity-fields">
              <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" />
              <input type="color" id="color-picker-input" value="#e74c3c" title="Choose your color" />
            </div>
          </div>

          <div id="car-select" class="lobby-panel">
            <h3>Choose Your Car</h3>
            <div id="car-options"></div>
          </div>
        </div>

        <!-- Center column -->
        <div id="lobby-center">
          <div id="track-select" class="lobby-panel">
            <h3>Race Tracks</h3>
            <div id="track-options"></div>
          </div>
          <div id="track-playlist" class="lobby-panel">
            <div id="playlist-header">
              <span id="playlist-label">Race order: <span id="playlist-mode">Random</span></span>
              <div>
                <button id="shuffle-all-btn">&#x1f500; All Tracks</button>
                <button id="clear-playlist-btn" style="display:none">Clear</button>
              </div>
            </div>
            <div id="playlist-chips"></div>
          </div>
        </div>

        <!-- Right column -->
        <div id="lobby-right">
          <div id="player-list" class="lobby-panel">
            <h3>Players</h3>
            <div id="players"></div>
          </div>
          <div id="bot-controls" class="lobby-panel">
            <div style="display:flex;gap:4px">
              <button id="add-bot-btn">+ Add Bot</button>
              <button id="remove-all-bots-btn">- Clear Bots</button>
            </div>
            <div id="bot-speed-control">
              <label for="bot-speed-slider">AI Speed: <span id="bot-speed-value">100%</span></label>
              <input type="range" id="bot-speed-slider" min="10" max="100" value="100" step="10" />
            </div>
            <div id="lap-count-control">
              <label for="lap-count-slider">Laps: <span id="lap-count-value">5</span></label>
              <input type="range" id="lap-count-slider" min="1" max="20" value="5" step="1" />
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div id="lobby-footer">
          <div id="footer-buttons">
            <button id="spectate-btn">Spectate</button>
            <button id="ready-btn">Ready</button>
          </div>
          <div id="keyboard-hints">
            <span>WASD / Arrows: Drive</span>
            <span>ESC: Pause</span>
            <span>0: Sound</span>
            <span>P: Autopilot</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat dialog (floating, draggable, resizable) -->
    <div id="chat-dialog" style="display:none">
      <div id="chat-dialog-header">
        <span id="chat-dialog-title">Chat</span>
        <button id="chat-close-btn">&times;</button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="Type a message..." maxlength="200" />
        <button id="chat-send-btn">Send</button>
      </div>
    </div>

    <!-- Settings dialog (floating panel) -->
    <div id="settings-dialog" style="display:none">
      <div id="settings-dialog-header">
        <span id="settings-dialog-title">Physics Settings</span>
        <button id="settings-close-btn">&times;</button>
      </div>
      <div id="settings-content"></div>
      <div id="settings-buttons">
        <button id="settings-copy-btn" title="Copy settings to clipboard">Copy</button>
        <button id="settings-paste-btn" title="Paste settings from clipboard">Paste</button>
        <button id="settings-reset-btn" title="Reset to defaults">Reset</button>
      </div>
    </div>

    <!-- Keybinds dialog (floating panel) -->
    <div id="keybinds-dialog" style="display:none">
      <div id="keybinds-dialog-header">
        <span>Key Bindings</span>
        <button id="keybinds-close-btn">&times;</button>
      </div>
      <div id="keybinds-content"></div>
      <div id="keybinds-buttons">
        <button id="keybinds-reset-btn">Reset Defaults</button>
      </div>
    </div>

    <!-- Countdown overlay -->
    <div id="countdown" class="overlay" style="display:none">
      <div id="countdown-lights">
        <div class="light" id="light-3"></div>
        <div class="light" id="light-2"></div>
        <div class="light" id="light-1"></div>
      </div>
    </div>

    <!-- Pause menu overlay -->
    <div id="pause-menu" class="overlay" style="display:none">
      <h2>Game Paused</h2>
      <p id="paused-by" class="subtitle"></p>
      <div id="pause-options">
        <button id="pause-resume-btn">Resume</button>
        <button id="pause-end-race-btn">End Race</button>
        <button id="pause-back-lobby-btn">Back to Lobby</button>
      </div>
    </div>

    <!-- HUD (hidden container for show/hide logic) -->
    <div id="hud" style="display:none"></div>

    <!-- Top-left race info panel -->
    <div id="race-info" style="display:none">
      <div id="race-time">0:00.00</div>
      <div id="track-name"></div>
      <div id="track-record"></div>
    </div>

    <!-- Big lap counter (top center) -->
    <div id="lap-counter" style="display:none">Lap 1/5</div>

    <!-- Top-right race order overlay -->
    <div id="race-order" style="display:none">
      <div id="lap-info">Lap 0/5</div>
      <div id="positions"></div>
    </div>

    <!-- Fireworks canvas -->
    <canvas id="fireworks-canvas" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;pointer-events:none;"></canvas>

    <!-- Results overlay -->
    <div id="results" class="overlay" style="display:none">
      <h2>Race Results</h2>
      <div id="results-body">
        <div id="results-left">
          <div id="results-list"></div>
        </div>
        <div id="results-right">
          <p id="results-record" class="results-record"></p>
          <div id="top-laps" class="top-laps-section"></div>
        </div>
      </div>
      <p class="subtitle">Returning to lobby...</p>
      <button id="results-ready-btn">Ready</button>
    </div>

    <!-- Championship standings overlay -->
    <div id="championship" class="overlay" style="display:none">
      <h2 id="championship-title">Championship Standings</h2>
      <div id="championship-list"></div>
      <button id="championship-ready-btn">Back to Lobby</button>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
