<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiRally</title>
  <link rel="stylesheet" href="/css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- Lobby overlay -->
    <div id="lobby" class="overlay">
      <h1>MultiRally</h1>
      <p class="subtitle">Online top-down racing</p>

      <div id="lobby-join">
        <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" />
        <div id="color-picker"></div>
        <button id="join-btn">Join</button>
      </div>

      <div id="lobby-room" style="display:none">
        <div id="player-settings">
          <div id="settings-row">
            <input type="text" id="change-name" placeholder="Change name" maxlength="20" />
            <button id="change-name-btn">Update</button>
            <div id="color-options"></div>
          </div>
        </div>

        <div id="car-select">
          <h3>Choose your car</h3>
          <div id="car-options"></div>
        </div>

        <div id="track-select">
          <h3>Race Tracks</h3>
          <div id="track-options"></div>
          <div id="track-playlist">
            <span id="playlist-label">Race order: <span id="playlist-mode">Random</span></span>
            <div id="playlist-chips"></div>
            <button id="clear-playlist-btn" style="display:none">Clear</button>
          </div>
        </div>

        <div id="player-list">
          <h3>Players</h3>
          <div id="players"></div>
        </div>

        <div id="bot-controls">
          <button id="add-bot-btn">+ Add Bot</button>
          <button id="remove-bot-btn">- Remove Bot</button>
          <div id="bot-speed-control">
            <label for="bot-speed-slider">AI Speed: <span id="bot-speed-value">100%</span></label>
            <input type="range" id="bot-speed-slider" min="10" max="200" value="100" step="10" />
          </div>
        </div>

        <button id="ready-btn">Ready</button>
      </div>
    </div>

    <!-- Countdown overlay -->
    <div id="countdown" class="overlay" style="display:none">
      <div id="countdown-lights">
        <div class="light" id="light-3"></div>
        <div class="light" id="light-2"></div>
        <div class="light" id="light-1"></div>
      </div>
    </div>

    <!-- Pause menu overlay -->
    <div id="pause-menu" class="overlay" style="display:none">
      <h2>Game Paused</h2>
      <p id="paused-by" class="subtitle"></p>
      <div id="pause-options">
        <button id="pause-resume-btn">Resume</button>
        <button id="pause-end-race-btn">End Race</button>
        <button id="pause-back-lobby-btn">Back to Lobby</button>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud" style="display:none">
      <div id="hud-left">
        <span id="track-name"></span>
        <span id="race-time">0:00.00</span>
      </div>
      <div id="hud-center">
        <span id="lap-info">Lap 0/5</span>
        <span id="speed-info">0 km/h</span>
      </div>
      <div id="hud-right">
        <div id="positions"></div>
      </div>
    </div>

    <!-- Results overlay -->
    <div id="results" class="overlay" style="display:none">
      <h2>Race Results</h2>
      <div id="results-list"></div>
      <p class="subtitle">Returning to lobby...</p>
      <button id="results-ready-btn">Ready</button>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
